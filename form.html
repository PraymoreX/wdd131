<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Review Form</title>
<meta name="description" content="Submit your product review easily using this simple and user friendly form to share your experience and feedback.">
<meta name="author" content="Praymore">
<link rel="stylesheet" href="./styles/form.css">
</head>

<body>

<header>
  <h1>Product Review</h1>
</header>

<main>
<form method="get" action="review.html" novalidate>

  <div class="form-group">
    <label for="product">Product Name <span class="required">*</span></label>
    <select id="product" name="product" required aria-required="true">
      <option value="" disabled selected>Select a Product ...</option>
    </select>
  </div>

  <fieldset class="form-group">
    <legend>Overall Rating <span class="required">*</span></legend>

    <input type="radio" id="rating1" name="rating" value="1" required>
    <label for="rating1">☆</label>

    <input type="radio" id="rating2" name="rating" value="2" required>
    <label for="rating2">☆☆</label>

    <input type="radio" id="rating3" name="rating" value="3" required>
    <label for="rating3">☆☆☆</label>

    <input type="radio" id="rating4" name="rating" value="4" required>
    <label for="rating4">☆☆☆☆</label>

    <input type="radio" id="rating5" name="rating" value="5" required>
    <label for="rating5">☆☆☆☆☆</label>

  </fieldset>

  <div class="form-group">
    <label for="date">Date of Installation <span class="required">*</span></label>
    <input type="date" id="date" name="date" required aria-required="true">
  </div>

  <fieldset class="form-group">
    <legend>Useful Features</legend>

    <input type="checkbox" id="durability" name="features" value="Durability">
    <label for="durability">Durability</label>

    <input type="checkbox" id="design" name="features" value="Design">
    <label for="design">Design</label>

    <input type="checkbox" id="performance" name="features" value="Performance">
    <label for="performance">Performance</label>

    <input type="checkbox" id="value" name="features" value="Value">
    <label for="value">Value</label>

  </fieldset>

  <div class="form-group">
    <label for="review">Written Review</label>
    <textarea id="review" name="review" rows="4"></textarea>
  </div>

  <div class="form-group">
    <label for="username">Your Name</label>
    <input type="text" id="username" name="username">
  </div>

  <div class="form-group">
    <input type="submit" value="Submit Review">
  </div>

</form>
</main>

<footer>
  <p>&copy; 2026 | Praymore | WDD 131</p>
</footer>

<script src="./scripts/form.js"></script>
</body>
</html>
